<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Taqwa</title>
  <style>
    :root {
      --bg: #0D0D0D;
      --card: #161616;
      --gold: #D4AF37;
      --text: #f5f5f5;
      --muted: #9ca3af;
      --border: #262626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .check {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.12);
      border: 2px solid rgba(212, 175, 55, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--gold);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .steps {
      margin-top: 24px;
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
    }
    .steps li {
      list-style: none;
      color: var(--text);
      font-size: 0.95rem;
      padding: 6px 0;
    }
    .steps li span {
      color: var(--gold);
      font-weight: 700;
      margin-right: 8px;
    }
    .brand {
      margin-top: 28px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your Taqwa account is now active.</p>
    <ul class="steps">
      <li><span>1.</span>Close this page</li>
      <li><span>2.</span>Open the <strong>Taqwa</strong> app</li>
      <li><span>3.</span>Log in with your email &amp; password</li>
    </ul>
    <div class="brand">🌙 TAQWA</div>
  </div>
</body>
</html>
