<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taqwa App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #056C4E;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #056C4E; }
    p { margin-top: 12px; color: #6b7280; line-height: 1.6; }
    .links { margin-top: 32px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .btn-primary { background: #056C4E; color: white; }
    .btn-secondary { background: #e6f4ef; color: #056C4E; }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🕌</div>
    <h1>Taqwa</h1>
    <p>Your Daily Islamic Companion — habits, Quran, prayer times, and more.</p>
    <div class="links">
      <a href="https://play.google.com/store" class="btn-primary">Get on Google Play</a>
      <a href="privacy.html" class="btn-secondary">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
